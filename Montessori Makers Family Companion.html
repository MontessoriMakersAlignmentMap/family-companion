<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Montessori Makers Family Companion</title>

<!-- PWA / home-screen install -->
<link rel="manifest" href="manifest.webmanifest"/>
<meta name="theme-color" content="#0e1a7a"/>
<link rel="icon" href="assets/icon-32.png" sizes="32x32"/>
<link rel="apple-touch-icon" href="assets/icon-180.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Family Companion"/>
<meta name="mobile-web-app-capable" content="yes"/>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles/styles.css"/>
<link rel="stylesheet" href="styles/dynamic-styles.css"/>

<style>
  html, body {
    margin: 0; padding: 0;
    background: #efeadf;
    min-height: 100vh;
  }
  @media (min-width: 641px) {
    html, body { overflow: hidden; }
  }

  #root { width: 100vw; height: 100vh; }

  .stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(1200px 800px at 20% 10%, rgba(214,167,88,0.08), transparent 60%),
      radial-gradient(900px 700px at 85% 90%, rgba(14,26,122,0.06), transparent 60%),
      #efeadf;
    overflow: hidden;
  }

  .context-label {
    position: absolute; left: 24px; top: 24px; right: 24px;
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--sans, Inter, sans-serif); font-size: 11px;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: rgba(14,26,122,0.3); font-weight: 500;
    pointer-events: none;
  }
  .context-label .r { display: flex; align-items: center; gap: 10px; }

  .eyebrow {
    font-family: var(--sans, Inter, sans-serif);
    font-size: 11px; letter-spacing: 0.16em;
    text-transform: uppercase; font-weight: 600;
    color: var(--navy, #0e1a7a);
    display: inline-flex; align-items: center; gap: 10px;
  }
  .eyebrow::before {
    content: ''; width: 18px; height: 1px; background: var(--gold, #d6a758);
  }

  button { font: inherit; }
  button:focus-visible { outline: 2px solid var(--gold, #d6a758); outline-offset: 2px; }

  @media (max-width: 640px) {
    .stage {
      background: var(--cream, #faf8f4) !important;
      display: block;
      overflow: auto;
    }
    .context-label { display: none; }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="stage">
  <div class="context-label">
    <span>Montessori Makers Family Companion</span>
    <span class="r">by Montessori Makers Group</span>
  </div>
  <div id="root"></div>
</div>

<!-- Prototype content + state (plain globals) -->
<script src="components/content.js"></script>
<script src="components/dynamic-content.js"></script>
<script src="components/state.js"></script>

<!-- Prototype UI (Babel-transpiled, order matters for global defs) -->
<script type="text/babel" src="components/ios-frame.jsx"></script>
<script type="text/babel" src="components/Profiles.jsx"></script>
<script type="text/babel" src="components/Journal.jsx"></script>
<script type="text/babel" src="components/Practice.jsx"></script>
<script type="text/babel" src="components/HomeScreen.jsx"></script>
<script type="text/babel" src="components/Screens.jsx"></script>

<!-- Supabase + gating (load after prototype UI so App can reference everything) -->
<script type="text/babel" src="components/supabase.jsx"></script>
<script type="text/babel" src="components/Onboarding.jsx"></script>
<script type="text/babel" src="components/Subscription.jsx"></script>
<script type="text/babel" src="components/App.jsx"></script>

<script type="text/babel">
const IS_PHONE = typeof window !== 'undefined' && window.matchMedia('(max-width: 640px)').matches;

const FullscreenApp = () => (
  <div style={{
    width: '100vw', height: '100vh',
    background: 'var(--cream, #faf8f4)',
    display: 'flex', flexDirection: 'column',
    fontFamily: 'var(--sans, Inter, sans-serif)', overflow: 'hidden',
  }}>
    <App/>
  </div>
);

const PhoneStage = () => {
  const [scale, setScale] = React.useState(1);
  const W = 402, H = 874;

  React.useEffect(() => {
    function fit() {
      const vw = window.innerWidth, vh = window.innerHeight;
      const available = { w: vw - 80, h: vh - 80 };
      const s = Math.min(available.w / W, available.h / H, 1.05);
      setScale(s);
    }
    fit();
    window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, []);

  return (
    <div style={{ transform: `scale(${scale})`, transformOrigin: 'center' }}>
      <IOSDevice width={W} height={H}>
        <App/>
      </IOSDevice>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(
  IS_PHONE ? <FullscreenApp/> : <PhoneStage/>
);
</script>
</body>
</html>
